<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">
        <span class="icon-emoji">✨</span>
      </div>
      <h1>Join Our Family!</h1>
      <p class="auth-subtitle">Create your account to start your pet adoption journey</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name" class="form-label">
          <span class="label-icon">👤</span> Full Name
        </label>
        <input
          type="text"
          id="name"
          [(ngModel)]="name"
          name="name"
          class="form-input"
          placeholder="Enter your full name"
          required>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">
          <span class="label-icon">📧</span> Email Address
        </label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          class="form-input"
          placeholder="Enter your email"
          required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">
          <span class="label-icon">🔒</span> Password
        </label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          class="form-input"
          placeholder="Create a strong password"
          required>
      </div>

      <div class="form-group">
        <label for="role" class="form-label">
          <span class="label-icon">🎭</span> Account Type
        </label>
        <select id="role" [(ngModel)]="role" name="role" class="form-input" required>
          <option value="USER">🐾 Pet Adopter</option>
          <option value="ADMIN">👑 Shelter Admin</option>
        </select>
      </div>

      <button type="submit" class="auth-btn" [disabled]="!name || !email || !password">
        <span class="btn-icon">🚀</span>
        <span class="btn-text">Create Account</span>
        <div class="btn-shine"></div>
      </button>
    </form>

    <div class="auth-footer">
      <div *ngIf="success" class="alert alert-success">
        <span class="alert-icon">✅</span>
        <span>{{ success }}</span>
      </div>

      <div *ngIf="error" class="alert alert-error">
        <span class="alert-icon">⚠️</span>
        <span>{{ error }}</span>
      </div>

      <div class="auth-links">
        <p>Already have an account?
          <a routerLink="/login" class="auth-link">
            <span class="link-icon">🔑</span> Sign In
          </a>
        </p>
      </div>
    </div>
  </div>

  <div class="auth-decoration">
    <div class="floating-pet pet-1">🐕</div>
    <div class="floating-pet pet-2">🐱</div>
    <div class="floating-pet pet-3">🐦</div>
    <div class="floating-pet pet-4">🐰</div>
  </div>
</div>
